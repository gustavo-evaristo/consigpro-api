app = 'consigpro-api-test'
primary_region = 'gru'

[build]

[env]
  PORT = "3000"
  NODE_ENV = "production"
  FRONTEND_URL = "https://app.consig.pro"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = false
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-1x"
  memory = "1gb"
